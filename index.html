<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Cleaning Bids</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<!-- ?v= busts the browser/Pages cache — bump it whenever js/css change -->
<link rel="stylesheet" href="style.css?v=9" />
</head>
<body>
<div class="bg-decor" aria-hidden="true"></div>

<header class="top">
  <div class="brand">
    <span class="brand-mark">🧹</span>
    <span class="brand-name">Cleaning<span>Bids</span></span>
  </div>
  <div class="top-stats">
    <div class="stat">
      <span class="stat-label">In all pots</span>
      <span class="stat-val" id="statTotal">0 JD</span>
    </div>
    <div class="stat">
      <span class="stat-label">Live areas</span>
      <span class="stat-val" id="statAreas">0</span>
    </div>
  </div>
  <div class="whoami">You <b id="userNameLabel">—</b><button id="changeNameBtn" class="linkbtn">change</button></div>
</header>

<main>
  <section class="intro reveal">
    <h1 class="display">Bid on an area.<br />Claim it to clean.</h1>
    <p class="lede">Add money to a room's pot, or select a few areas and back them all with one bid. When a pot is worth it, someone claims the area and cleans it.</p>
  </section>

  <div class="board-grid">
    <div class="col-main">
      <section class="card floor-card reveal">
        <div class="card-head"><span>Floor plan</span><span class="hint" id="selHint">Tap areas to select</span></div>
        <div class="floorplan-wrap" id="floorPlanWrap"></div>
      </section>

      <section class="card composer reveal" id="composer"></section>
    </div>

    <aside class="col-side">
      <section class="card dashboard reveal" id="dashboard"></section>
    </aside>
  </div>

  <section class="history-section reveal">
    <div class="section-head"><span>Claim history</span></div>
    <div id="historyList" class="history-list"></div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js?v=9"></script>
<script src="config.js?v=9"></script>
<script src="app.js?v=9"></script>
</body>
</html>
